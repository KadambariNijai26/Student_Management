{% extends 'base.html' %}

{% block content %}

<h2>Marks - {{ student.name }}</h2>

<a href="{% url 'add_marks' student.id %}">+ Add Marks</a>

<hr>

{% for m in records %}
    <p>
        {{ m.subject }} - {{ m.marks }}
        <a href="{% url 'update_marks' m.id %}">Edit</a>
        <a href="{% url 'delete_marks' m.id %}">Delete</a>
    </p>
{% empty %}
    <p>No marks found</p>
{% endfor %}

{% endblock %}
