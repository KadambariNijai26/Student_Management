{% extends 'base.html' %}

{% block content %}

<h2>Update Marks</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="subject" value="{{ marks.subject }}">
    <input type="number" name="marks" value="{{ marks.marks }}">

    <button type="submit">Update</button>
</form>

{% endblock %}
