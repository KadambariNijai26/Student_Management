{% extends 'base.html' %}

{% block content %}

<h2>Add Marks - {{ student.name }}</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="subject" placeholder="Subject">
    <input type="number" name="marks" placeholder="Marks">

    <button type="submit">Save</button>
</form>

{% endblock %}
