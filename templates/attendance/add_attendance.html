{% extends 'base.html' %}

{% block content %}

<h2>Add Attendance - {{ student.name }}</h2>

<form method="POST">
    {% csrf_token %}

    <label>Status:</label>
    <select name="status">
        <option>Present</option>
        <option>Absent</option>
    </select>

    <br><br>

    <label>Date:</label>
    <input type="date" name="date">

    <br><br>

    <button type="submit">Save</button>
</form>

{% endblock %}
