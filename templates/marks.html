{% extends 'base.html' %}

{% block content %}

<div style="padding:30px;">

    <h1>Student Marks Records</h1>

    <table border="1" cellpadding="10">

        <tr>
            <th>Student</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        {% for mark in data %}

        <tr>
            <td>{{ mark.student.name }}</td>
            <td>{{ mark.subject }}</td>
            <td>{{ mark.marks }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
