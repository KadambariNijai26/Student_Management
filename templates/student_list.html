{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="d-flex justify-content-between">

        <h1>Students List</h1>

        <a href="/add-student/"
           class="btn btn-success">

            Add Student

        </a>


        <form method="GET"
      class="mb-4">

    <div class="row">

        <div class="col-md-10">

            <input type="text"
                   name="q"
                   class="form-control"
                   placeholder="Search by Name, Roll No or Course">

        </div>

        <div class="col-md-2">

            <button type="submit"
                    class="btn btn-dark w-100">

                Search

            </button>

        </div>

    </div>

</form>
    </div>

    <table class="table table-bordered mt-4">

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Roll No</th>

            <th>Course</th>

            <th>Contact</th>

            <th>Actions</th>

        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student.id }}</td>

            <td>{{ student.name }}</td>

            <td>{{ student.roll_no }}</td>

            <td>{{ student.course }}</td>

            <td>{{ student.contact }}</td>

            <td>

                <a href="/update-student/{{ student.id }}/"
                   class="btn btn-primary">

                    Edit

                </a>

                <a href="/delete-student/{{ student.id }}/"
                   class="btn btn-danger">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
