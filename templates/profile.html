{% extends 'base.html' %}

{% block content %}

<div style="padding:30px;">

    <h1>User Profile</h1>

    <p><strong>Username:</strong> {{ request.user.username }}</p>

    <p><strong>Email:</strong> {{ request.user.email }}</p>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Update Profile
        </button>

    </form>

</div>

{% endblock %}
