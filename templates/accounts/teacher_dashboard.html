{% extends 'base.html' %}

{% block content %}

<div style="padding:30px;">

    <h1>Teacher Dashboard</h1>

    <hr>

    <!-- TOP BUTTONS -->

    <div style="margin-bottom:25px;">

        <!-- ADD STUDENT -->
        <a href="/students/add/"
           style="
                background:#28a745;
                color:white;
                padding:10px 20px;
                text-decoration:none;
                border-radius:5px;
                margin-right:10px;
           ">

            + Add Student

        </a>

        <!-- STUDENT LIST -->
        <a href="{% url 'student_list' %}"
           style="
                background:#007bff;
                color:white;
                padding:10px 20px;
                text-decoration:none;
                border-radius:5px;
                margin-right:10px;
           ">

            Students List

        </a>

    </div>

    <hr>

    <!-- MODULE BUTTONS -->

    <div style="
        display:flex;
        gap:20px;
        margin-top:30px;
        flex-wrap:wrap;
    ">

        <!-- ATTENDANCE -->

        <a href="{% url 'attendance_students' %}"
           style="
                width:220px;
                padding:25px;
                border:1px solid #ccc;
                border-radius:8px;
                text-decoration:none;
                color:black;
                background:#f8f9fa;
                text-align:center;
           ">

            <h3>Attendance</h3>

            <p>
                Manage student attendance
            </p>

        </a>

        <!-- MARKS -->

        <a href="{% url 'marks_students' %}"
           style="
                width:220px;
                padding:25px;
                border:1px solid #ccc;
                border-radius:8px;
                text-decoration:none;
                color:black;
                background:#f8f9fa;
                text-align:center;
           ">

            <h3>Marks</h3>

            <p>
                Manage student marks
            </p>

        </a>

        <!-- FEES -->

        <a href="{% url 'fees_students' %}"
           style="
                width:220px;
                padding:25px;
                border:1px solid #ccc;
                border-radius:8px;
                text-decoration:none;
                color:black;
                background:#f8f9fa;
                text-align:center;
           ">

            <h3>Fees</h3>

            <p>
                Manage student fees
            </p>

        </a>

    </div>

</div>

{% endblock %}
