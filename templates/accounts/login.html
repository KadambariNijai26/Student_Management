{% extends 'base.html' %}

{% block content %}

<div style="padding:30px;">

    <h1>Login</h1>

    {% for message in messages %}

        <p style="color:red;">
            {{ message }}
        </p>

    {% endfor %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <br><br>

        <button type="submit">

            Login

        </button>

    </form>

</div>

{% endblock %}
