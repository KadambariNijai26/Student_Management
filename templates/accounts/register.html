{% extends 'base.html' %}

{% block content %}

<div style="padding:30px;">

    <h1>Student Registration</h1>

    {% for message in messages %}

        <p style="color:green;">
            {{ message }}
        </p>

    {% endfor %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>
         <br><br>

        <select name="role">

            <option value="student">Student</option>

            <option value="teacher">Teacher</option>

            <option value="admin">Admin</option>

        </select>

        <br><br>

        <button type="submit">

            Register

        </button>

    </form>

</div>

{% endblock %}
