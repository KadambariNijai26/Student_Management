{% extends 'base.html' %}

{% block content %}

<div style="padding:30px;">

    <h2>Update Fees</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Total Fees:</label>
        <input type="number" name="total_fees" value="{{ fees.total_fees }}"><br><br>

        <label>Paid Fees:</label>
        <input type="number" name="paid_fees" value="{{ fees.paid_fees }}"><br><br>

        <button type="submit">Update</button>
    </form>

</div>

{% endblock %}
